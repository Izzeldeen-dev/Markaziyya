<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Al Markaziyya × OrderTech — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0D0D0D;font-family:'Segoe UI',Tahoma,system-ui,sans-serif;color:#EFEFEF;min-height:100vh}
input,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1A1A1A}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.4);cursor:pointer}
input:focus{outline:none;border-color:#C0392B !important}
button:hover{opacity:.85}

.hdr{background:linear-gradient(135deg,#A93226 0%,#C0392B 55%,#7B241C 100%);padding:15px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{color:#fff;font-weight:700;font-size:18px;letter-spacing:-.3px}
.hdr-sub{color:rgba(255,255,255,.55);font-size:11px;margin-top:3px;letter-spacing:2px;text-transform:uppercase}
.hdr-badge{background:rgba(0,0,0,.25);color:rgba(255,255,255,.9);font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500}
.hdr-date{color:rgba(255,255,255,.35);font-size:10px;margin-top:4px;text-align:right;letter-spacing:.5px}

.nav{display:flex;background:#111;border-bottom:1px solid #1E1E1E;padding:0 24px;gap:4px}
.nav-btn{padding:11px 20px;cursor:pointer;font-size:13px;background:none;border:none;border-bottom:2px solid transparent;color:#666;transition:all .15s}
.nav-btn.active{color:#C0392B;border-bottom-color:#C0392B;font-weight:600}

.body{padding:20px 24px}
.tab{display:none}.tab.active{display:block}

.pill-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.pill{padding:7px 20px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #2A2A2A;background:transparent;color:#777;transition:all .2s}
.pill.active{background:#C0392B;color:#fff;border-color:#C0392B;font-weight:600}

.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.kpi-card{background:#161616;border-radius:10px;padding:15px 18px}
.kpi-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:600}
.kpi-value{font-size:26px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:11px;color:#3A3A3A;margin-top:4px}

.summary-bar{background:#0F0F0F;border:1px solid #1E1E1E;border-radius:10px;padding:10px 18px;margin-bottom:16px;display:flex;gap:28px;align-items:center;flex-wrap:wrap}

.card{background:#161616;border-radius:10px;padding:18px 20px;margin-bottom:14px}
.card-title{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:16px}
.chart-wrap{position:relative}
.legend{display:flex;gap:18px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#666}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.charts-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}

.form-card{background:#161616;border-radius:10px;padding:20px 22px;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.f-group{display:flex;flex-direction:column;gap:6px}
.f-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.f-input{background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px;padding:11px 14px;color:#EFEFEF;font-size:15px;width:100%;transition:border-color .2s}
.f-input:hover{border-color:#333}
.save-btn{width:100%;padding:14px;border-radius:9px;border:none;cursor:pointer;font-size:15px;font-weight:600;color:#fff;letter-spacing:.3px;transition:background .3s}
.save-btn.idle{background:#C0392B}.save-btn.ok{background:#1E8449}

.preview-card{background:#161616;border-radius:10px;padding:18px 22px;border-left:3px solid #C0392B}
.preview-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1C1C1C;font-size:13px}
.preview-row:last-child{border-bottom:none}

.tbl-card{background:#161616;border-radius:10px;padding:18px 20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
th{text-align:left;padding:10px 14px;color:#444;font-weight:600;border-bottom:1px solid #222;font-size:10px;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap}
td{padding:10px 14px;border-bottom:1px solid #1A1A1A;white-space:nowrap}
tr:last-child td{border-bottom:none}
.del-btn{background:none;border:1px solid #2A2A2A;border-radius:5px;color:#444;padding:4px 10px;cursor:pointer;font-size:11px;transition:all .15s}
.del-btn:hover{border-color:#C0392B;color:#C0392B}
.del-yes{background:#C0392B;border:none;border-radius:4px;color:#fff;padding:4px 10px;cursor:pointer;font-size:11px;margin-right:4px}
.del-no{background:none;border:1px solid #333;border-radius:4px;color:#666;padding:4px 10px;cursor:pointer;font-size:11px}

.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:56px;opacity:.08;margin-bottom:16px}
.empty-text{color:#444;font-size:15px;margin-bottom:10px}
.empty-link{background:none;border:none;color:#C0392B;font-size:13px;cursor:pointer;text-decoration:underline}

@media(max-width:600px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .charts-2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .hdr{flex-direction:column;gap:10px;align-items:flex-start}
}

/* QUALITY TAB */
.q-form{max-width:700px}
.q-card{background:#161616;border-radius:10px;padding:18px 20px;margin-bottom:14px;border:1px solid #222}
.q-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;padding:6px 12px;border-radius:6px}
.q-section-title.opening{background:#1A2A1A;color:#4CAF50}
.q-section-title.comms{background:#1A1A2A;color:#5B9BD5}
.q-section-title.process{background:#2A1A1A;color:#E07B39}
.q-section-title.closing{background:#2A1A2A;color:#A87FC2}
.q-section-title.metrics{background:#1A2A2A;color:#4DB6AC}
.q-criteria-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #1E1E1E;gap:12px}
.q-criteria-row:last-child{border-bottom:none}
.q-criteria-label{font-size:13px;color:#CCC;flex:1}
.q-score-btns{display:flex;gap:4px}
.q-score-btn{width:32px;height:32px;border-radius:6px;border:1.5px solid #2A2A2A;background:none;color:#666;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.q-score-btn:hover{border-color:#C0392B;color:#C0392B}
.q-score-btn.active-0{background:#B71C1C;border-color:#B71C1C;color:#fff}
.q-score-btn.active-1{background:#C62828;border-color:#C62828;color:#fff}
.q-score-btn.active-2{background:#E65100;border-color:#E65100;color:#fff}
.q-score-btn.active-3{background:#F57F17;border-color:#F57F17;color:#fff}
.q-score-btn.active-4{background:#558B2F;border-color:#558B2F;color:#fff}
.q-score-btn.active-5{background:#1B5E20;border-color:#1B5E20;color:#fff}
.q-metric-select{background:#1A1A1A;border:1.5px solid #2A2A2A;border-radius:8px;padding:7px 12px;color:#CCC;font-size:13px;cursor:pointer}
.q-metric-select:focus{outline:none;border-color:#C0392B}
.q-score-summary{background:#0F0F0F;border:1px solid #222;border-radius:10px;padding:12px 16px;display:flex;gap:20px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.q-score-big{font-size:36px;font-weight:700;color:#C0392B;letter-spacing:-1px}
.q-score-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.q-grade{padding:4px 14px;border-radius:20px;font-size:13px;font-weight:700}
.q-grade.A{background:#1B5E20;color:#fff}
.q-grade.B{background:#558B2F;color:#fff}
.q-grade.C{background:#F57F17;color:#fff}
.q-grade.D{background:#C62828;color:#fff}
.q-grade.F{background:#B71C1C;color:#fff}
/* Audio upload */
.audio-upload-area{border:2px dashed #2A2A2A;border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:12px}
.audio-upload-area:hover{border-color:#C0392B}
.audio-upload-area.has-file{border-color:#2E7D32;background:#0F1F0F}
.audio-player{width:100%;margin-top:8px;accent-color:#C0392B}
/* Quality records */
.q-record{background:#161616;border-radius:10px;border:1px solid #222;margin-bottom:10px;overflow:hidden}
.q-record-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer}
.q-record-hdr:hover{background:#1A1A1A}
.q-record-body{padding:0 16px 14px;display:none}
.q-record-body.open{display:block}
.q-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.q-mini-item{background:#0F0F0F;border-radius:7px;padding:7px 10px;font-size:11px}
.q-mini-label{color:#555;margin-bottom:2px}
.q-mini-val{font-size:14px;font-weight:700}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">&#x645;&#x637;&#x639;&#x645; &#x627;&#x644;&#x645;&#x631;&#x643;&#x632;&#x64A;&#x629; &nbsp;&times;&nbsp; <span style="font-family:monospace;letter-spacing:2px">OrderTech</span></div>
    <div class="hdr-sub">Call Center Performance Dashboard</div>
  </div>
  <div style="text-align:right">
    <div class="hdr-badge" id="days-badge">0 days recorded</div>
    <div class="hdr-date" id="today-date"></div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="switchTab('dashboard')">&#x1F4CA;&nbsp; Dashboard</button>
  <button class="nav-btn" id="nav-input" onclick="switchTab('input')">&#x2795;&nbsp; Add Data</button>
  <button class="nav-btn" id="nav-records" onclick="switchTab('records')">&#x1F4CB;&nbsp; Records</button>
  <button class="nav-btn" id="nav-quality" onclick="switchTab('quality')">&#x2B50;&nbsp; Quality</button>
</div>

<div class="body">

  <div class="tab active" id="tab-dashboard">
    <div class="pill-row">
      <button class="pill" id="pill-daily" onclick="switchView('daily')">Today</button>
      <button class="pill active" id="pill-weekly" onclick="switchView('weekly')">Last 7 Days</button>
      <button class="pill" id="pill-monthly" onclick="switchView('monthly')">This Month</button>
    </div>
    <div id="dash-body"></div>
  </div>

  <div class="tab" id="tab-input" style="max-width:580px">
    <div class="form-card">
      <div class="card-title">Daily Entry</div>
      <div style="margin-bottom:18px">
        <div class="f-label" style="color:#C0392B;margin-bottom:7px">Date</div>
        <input type="date" class="f-input" id="f-date" onchange="showPreview()"/>
      </div>
      <div class="form-grid">
        <div class="f-group">
          <div class="f-label" style="color:#27AE60">Answered Calls</div>
          <input type="number" class="f-input" id="f-answered" placeholder="e.g. 120"/>
        </div>
        <div class="f-group">
          <div class="f-label" style="color:#2980B9">Outbound Calls</div>
          <input type="number" class="f-input" id="f-outbound" placeholder="e.g. 45"/>
        </div>
        <div class="f-group">
          <div class="f-label" style="color:#C0392B">Missed Calls</div>
          <input type="number" class="f-input" id="f-missed" placeholder="e.g. 15"/>
        </div>
        <div class="f-group">
          <div class="f-label" style="color:#F39C12">SLA (%)</div>
          <input type="number" class="f-input" id="f-sla" placeholder="e.g. 92.5" step="0.1"/>
        </div>
        <div class="f-group">
          <div class="f-label" style="color:#E67E22">Abandon Rate (%)</div>
          <input type="number" class="f-input" id="f-abandon" placeholder="e.g. 8.2" step="0.1"/>
        </div>
        <div class="f-group">
          <div class="f-label" style="color:#9B59B6">Avg Handle Time (min)</div>
          <input type="number" class="f-input" id="f-handle" placeholder="e.g. 4.5" step="0.1"/>
        </div>
      </div>
      <button class="save-btn idle" id="save-btn" onclick="saveEntry()">Save Daily Entry</button>
    </div>
    <div id="entry-preview"></div>
  </div>

  <div class="tab" id="tab-records">
    <div id="records-body"></div>
  </div>

</div>

<script>
const KEY = 'mz_cc_v3';
let allData = [];
let curView = 'weekly';
let myCharts = {};

function loadData() {
  try { var s = localStorage.getItem(KEY); if(s) allData = JSON.parse(s); } catch(e) {}
}
function saveData(d) { allData = d; try { localStorage.setItem(KEY, JSON.stringify(d)); } catch(e) {} }

function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtShort(s) { return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'}); }
function fmtLong(s)  { return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }
function sum(data,k) { return data.reduce(function(a,d){return a+(d[k]||0);},0); }
function avg(data,k) { return data.length ? sum(data,k)/data.length : 0; }

function init() {
  loadData();
  document.getElementById('f-date').value = todayStr();
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  updateBadge();
  renderDash();
}

function updateBadge() {
  document.getElementById('days-badge').textContent = allData.length + ' days recorded';
}

function switchTab(name) {
  ['dashboard','input','records'].forEach(function(t) {
    document.getElementById('tab-'+t).classList.remove('active');
    document.getElementById('nav-'+t).classList.remove('active');
  });
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name === 'records') renderRecords();
  if (name === 'dashboard') { destroyCharts(); renderDash(); }
}

function switchView(v) {
  curView = v;
  ['daily','weekly','monthly'].forEach(function(p) {
    document.getElementById('pill-'+p).classList.remove('active');
  });
  document.getElementById('pill-'+v).classList.add('active');
  destroyCharts();
  renderDash();
}

function getViewData() {
  var now = new Date();
  if (curView === 'daily') return allData.slice(-1);
  if (curView === 'weekly') {
    var ago = new Date(now); ago.setDate(ago.getDate()-7);
    return allData.filter(function(d){ return new Date(d.date) >= ago; });
  }
  var start = new Date(now.getFullYear(), now.getMonth(), 1);
  return allData.filter(function(d){ return new Date(d.date) >= start; });
}

function destroyCharts() {
  Object.keys(myCharts).forEach(function(k){ try{ myCharts[k].destroy(); }catch(e){} });
  myCharts = {};
}

function renderDash() {
  var vd = getViewData();
  var el = document.getElementById('dash-body');
  if (!el) return;

  if (vd.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F4E1;</div><div class="empty-text">No data for this period</div><button class="empty-link" onclick="switchTab(\'input\')">Add Data &#x2192;</button></div>';
    return;
  }

  var totalCalls = sum(vd,'answered') + sum(vd,'outbound') + sum(vd,'missed');
  var resolution = totalCalls > 0 ? Math.round((sum(vd,'answered')/totalCalls)*100) : 0;
  var avgSLA     = avg(vd,'sla').toFixed(1);
  var avgAban    = avg(vd,'abandonRate').toFixed(1);
  var avgHdl     = avg(vd,'avgHandle').toFixed(1);
  var avgAns     = Math.round(avg(vd,'answered'));
  var avgOut     = Math.round(avg(vd,'outbound'));
  var avgMis     = Math.round(avg(vd,'missed'));
  var sub = vd.length > 1;

  el.innerHTML =
    '<div class="kpi-grid">'
    + '<div class="kpi-card" style="border-left:3px solid #27AE60"><div class="kpi-label">Answered Calls</div><div class="kpi-value" style="color:#27AE60">'+sum(vd,'answered').toLocaleString()+'</div>'+(sub?'<div class="kpi-sub">avg '+avgAns+'/day</div>':'')+'</div>'
    + '<div class="kpi-card" style="border-left:3px solid #2980B9"><div class="kpi-label">Outbound Calls</div><div class="kpi-value" style="color:#2980B9">'+sum(vd,'outbound').toLocaleString()+'</div>'+(sub?'<div class="kpi-sub">avg '+avgOut+'/day</div>':'')+'</div>'
    + '<div class="kpi-card" style="border-left:3px solid #C0392B"><div class="kpi-label">Missed Calls</div><div class="kpi-value" style="color:#C0392B">'+sum(vd,'missed').toLocaleString()+'</div>'+(sub?'<div class="kpi-sub">avg '+avgMis+'/day</div>':'')+'</div>'
    + '<div class="kpi-card" style="border-left:3px solid #F39C12"><div class="kpi-label">SLA</div><div class="kpi-value" style="color:#F39C12">'+avgSLA+'%</div></div>'
    + '<div class="kpi-card" style="border-left:3px solid #E67E22"><div class="kpi-label">Abandon Rate</div><div class="kpi-value" style="color:#E67E22">'+avgAban+'%</div></div>'
    + '<div class="kpi-card" style="border-left:3px solid #9B59B6"><div class="kpi-label">Avg Handle Time</div><div class="kpi-value" style="color:#9B59B6">'+avgHdl+' min</div></div>'
    + '</div>'
    + '<div class="summary-bar">'
    + '<span style="font-size:10px;color:#3A3A3A;text-transform:uppercase;letter-spacing:1.2px">Period</span>'
    + '<span style="font-size:13px;color:#777"><b style="color:#EFEFEF;font-weight:700;margin-right:4px">'+totalCalls.toLocaleString()+'</b>total calls</span>'
    + '<span style="font-size:13px;color:#777"><b style="color:#EFEFEF;font-weight:700;margin-right:4px">'+vd.length+'</b>days</span>'
    + '<span style="font-size:13px;color:#777;margin-left:auto">Resolution: <b style="color:#27AE60;font-weight:700">'+resolution+'%</b></span>'
    + '</div>'
    + '<div class="card"><div class="card-title">Calls Volume</div><div class="chart-wrap" style="height:230px"><canvas id="ch-vol"></canvas></div>'
    + '<div class="legend"><span class="legend-item"><span class="legend-dot" style="background:#27AE60"></span>Answered</span><span class="legend-item"><span class="legend-dot" style="background:#2980B9"></span>Outbound</span><span class="legend-item"><span class="legend-dot" style="background:#C0392B"></span>Missed</span></div></div>'
    + '<div class="charts-2">'
    + '<div class="card" style="margin-bottom:0"><div class="card-title">SLA %</div><div class="chart-wrap" style="height:180px"><canvas id="ch-sla"></canvas></div></div>'
    + '<div class="card" style="margin-bottom:0"><div class="card-title">Abandon Rate %</div><div class="chart-wrap" style="height:180px"><canvas id="ch-abn"></canvas></div></div>'
    + '</div><div style="height:14px"></div>'
    + '<div class="card"><div class="card-title">Average Handle Time (minutes)</div><div class="chart-wrap" style="height:180px"><canvas id="ch-hdl"></canvas></div></div>';

  var labels = vd.map(function(d){ return fmtShort(d.date); });
  var gc = '#1C1C1C', tc = '#444';
  var axBase = { grid:{color:gc,drawBorder:false}, ticks:{color:tc,font:{size:11}}, border:{display:false} };
  var ttBase = { backgroundColor:'#1E1E1E', borderColor:'#2A2A2A', borderWidth:1, titleColor:'#888', bodyColor:'#CCC', padding:10, cornerRadius:8 };

  myCharts.vol = new Chart(document.getElementById('ch-vol'), {
    type:'bar',
    data:{ labels:labels, datasets:[
      {label:'Answered', data:vd.map(function(d){return d.answered;}), backgroundColor:'#27AE60', borderRadius:3, borderSkipped:false},
      {label:'Outbound', data:vd.map(function(d){return d.outbound;}), backgroundColor:'#2980B9', borderRadius:3, borderSkipped:false},
      {label:'Missed',   data:vd.map(function(d){return d.missed;}),   backgroundColor:'#C0392B', borderRadius:3, borderSkipped:false},
    ]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:ttBase}, scales:{x:axBase,y:axBase}, categoryPercentage:0.7, barPercentage:0.85 }
  });

  myCharts.sla = new Chart(document.getElementById('ch-sla'), {
    type:'line',
    data:{ labels:labels, datasets:[{ label:'SLA %', data:vd.map(function(d){return d.sla;}), borderColor:'#F39C12', backgroundColor:'rgba(243,156,18,0.15)', borderWidth:2, fill:true, tension:0.3, pointBackgroundColor:'#F39C12', pointRadius:4 }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{...ttBase, callbacks:{label:function(c){return ' '+c.formattedValue+'%';}}}}, scales:{x:axBase, y:{...axBase, min:0, max:100, ticks:{...axBase.ticks, callback:function(v){return v+'%';}}}} }
  });

  myCharts.abn = new Chart(document.getElementById('ch-abn'), {
    type:'line',

function saveEntry() {
  var date = document.getElementById('f-date').value;
  if (!date) { alert('Please select a date'); return; }
  var entry = {
    date: date,
    answered:    parseFloat(document.getElementById('f-answered').value)||0,
    outbound:    parseFloat(document.getElementById('f-outbound').value)||0,
    missed:      parseFloat(document.getElementById('f-missed').value)||0,
    sla:         parseFloat(document.getElementById('f-sla').value)||0,
    abandonRate: parseFloat(document.getElementById('f-abandon').value)||0,
    avgHandle:   parseFloat(document.getElementById('f-handle').value)||0,
  };
  var newData = allData.filter(function(d){return d.date!==date;});
  newData.push(entry);
  newData.sort(function(a,b){return a.date.localeCompare(b.date);});
  saveData(newData);
  updateBadge();
  var btn = document.getElementById('save-btn');
  btn.textContent = '&#x2713;  Saved successfully!';
  btn.innerHTML = '&#x2713;&nbsp; Saved successfully!';
  btn.classList.remove('idle'); btn.classList.add('ok');
  setTimeout(function(){
    btn.textContent = 'Save Daily Entry';
    btn.classList.remove('ok'); btn.classList.add('idle');
  }, 2500);
  ['answered','outbound','missed','sla','abandon','handle'].forEach(function(id){
    document.getElementById('f-'+id).value='';
  });
  showPreview();
}

function showPreview() {
  var date = document.getElementById('f-date').value;
  var ex = allData.find(function(d){return d.date===date;});
  var el = document.getElementById('entry-preview');
  if (!ex) { el.innerHTML=''; return; }
  var rows = [
    ['Answered Calls', ex.answered, '#27AE60'],
    ['Outbound Calls', ex.outbound, '#2980B9'],
    ['Missed Calls',   ex.missed,   '#C0392B'],
    ['SLA',            ex.sla+'%',  '#F39C12'],
    ['Abandon Rate',   ex.abandonRate+'%', '#E67E22'],
    ['Avg Handle',     ex.avgHandle+' min','#9B59B6'],
  ];
  el.innerHTML = '<div class="preview-card"><div class="card-title">Saved — '+fmtLong(date)+'</div>'
    + rows.map(function(r){return '<div class="preview-row"><span style="color:#555">'+r[0]+'</span><span style="color:'+r[2]+';font-weight:600">'+r[1]+'</span></div>';}).join('')
    + '</div>';
}

function renderRecords() {
  var el = document.getElementById('records-body');
  if (allData.length === 0) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">&#x1F4CB;</div><div class="empty-text">No records yet</div></div>';
    return;
  }
  var sorted = allData.slice().reverse();
  var rows = sorted.map(function(d){
    return '<tr>'
      +'<td style="color:#C0392B;font-weight:600">'+new Date(d.date+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+'</td>'
      +'<td style="color:#27AE60;font-weight:500">'+d.answered.toLocaleString()+'</td>'
      +'<td style="color:#2980B9;font-weight:500">'+d.outbound.toLocaleString()+'</td>'
      +'<td style="color:#C0392B;font-weight:500">'+d.missed.toLocaleString()+'</td>'
      +'<td style="color:#F39C12;font-weight:500">'+d.sla+'%</td>'
      +'<td style="color:#E67E22;font-weight:500">'+d.abandonRate+'%</td>'
      +'<td style="color:#9B59B6;font-weight:500">'+d.avgHandle+' min</td>'
      +'<td><button class="del-btn" onclick="askDelete(\''+d.date+'\')">Delete</button></td>'
      +'</tr>';
  }).join('');
  el.innerHTML = '<div class="tbl-card"><table><thead><tr>'
    +'<th>Date</th><th>Answered</th><th>Outbound</th><th>Missed</th><th>SLA %</th><th>Abandon %</th><th>Handle (min)</th><th></th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>'
    +'<div style="margin-top:12px;font-size:11px;color:#333;text-align:right">'+allData.length+' total entries</div>'
    +'</div>';
}

function askDelete(date) {
  var rows = document.querySelectorAll('#records-body tr');
  var fmtTarget = new Date(date+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  rows.forEach(function(row){
    if (row.cells[0] && row.cells[0].textContent.trim() === fmtTarget) {
      var last = row.cells[row.cells.length-1];
      last.innerHTML = '<button class="del-yes" onclick="doDelete(\''+date+'\')">Confirm</button>'
        +'<button class="del-no" onclick="renderRecords()">Cancel</button>';
    }
  });
}

function doDelete(date) {
  saveData(allData.filter(function(d){return d.date!==date;}));
  updateBadge();
  renderRecords();
}

// QUALITY CRITERIA
// ══════════════════════════════════════
var Q_CRITERIA = {
  opening: [
    "Professional & warm greeting",
    "Agent introduces self & company",
    "Uses customer's name at least twice",
  ],
  comms: [
    "Clear articulation, good pace & volume",
    "Active listening (paraphrasing, acknowledging)",
    "Positive & helpful attitude",
  ],
  process: [
    "Followed script / greeting & closing script",
    "Correct policy & procedure adherence",
    "Accurate information given",
    "Correct use of tools/systems",
  ],
  closing: [
    "Summarised next steps / resolution",
    "Offered additional help / upsell if appropriate",
    "Polite & friendly closing",
    "Thanked customer",
  ],
};

var Q_METRICS = [
  "AHT (Average Handle Time)",
  "Hold time usage",
  "After-Call Work (ACW) quality",
];

var qScores = {};   // {sectionKey_idx: score}
var qMetrics = {};  // {metricIdx: value}
var qAudioURL = null;

// ── Build criteria UI ──────────────────
function buildQualityForm() {
  Object.keys(Q_CRITERIA).forEach(function(sec) {
    var el = document.getElementById('section-'+sec);
    if(!el) return;
    el.innerHTML = Q_CRITERIA[sec].map(function(label, i) {
      var key = sec+'_'+i;
      return '<div class="q-criteria-row">'
        +'<span class="q-criteria-label">'+label+'</span>'
        +'<div class="q-score-btns">'
        +[0,1,2,3,4,5].map(function(n){
          return '<button class="q-score-btn" id="qb-'+key+'-'+n+'" onclick="setScore(''+key+'','+n+')">'+n+'</button>';
        }).join('')
        +'</div>'
        +'</div>';
    }).join('');
  });

  var metEl = document.getElementById('section-metrics');
  if(metEl) {
    metEl.innerHTML = Q_METRICS.map(function(label, i) {
      return '<div class="q-criteria-row">'
        +'<span class="q-criteria-label">'+label+'</span>'
        +'<select class="q-metric-select" id="qm-'+i+'" onchange="setMetric('+i+',this.value)">'
        +'<option value="">-- Rate --</option>'
        +'<option value="Excellent">⭐ Excellent</option>'
        +'<option value="Good">✅ Good</option>'
        +'<option value="Needs Improvement">⚠️ Needs Improvement</option>'
        +'<option value="Poor">❌ Poor</option>'
        +'</select>'
        +'</div>';
    }).join('');
  }

  // Set today's date
  var dEl = document.getElementById('q-date');
  if(dEl && !dEl.value) dEl.value = new Date().toISOString().slice(0,10);
}

function setScore(key, n) {
  qScores[key] = n;
  // Update button styles
  var sec = key.split('_')[0], idx = key.split('_')[1];
  [0,1,2,3,4,5].forEach(function(i) {
    var btn = document.getElementById('qb-'+key+'-'+i);
    if(btn) btn.className = 'q-score-btn' + (i===n?' active-'+n:'');
  });
  updateScoreSummary();
}

function setMetric(idx, val) {
  qMetrics[idx] = val;
}

function updateScoreSummary() {
  var total = 0;
  Object.values(qScores).forEach(function(s){ total += s; });
  var max = 70;
  var pct = Math.round((total/max)*100);
  var grade = pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
  var gradeColor = {A:'#1B5E20',B:'#558B2F',C:'#F57F17',D:'#C62828',F:'#B71C1C'};
  document.getElementById('q-total-score').textContent = total+'/'+max;
  document.getElementById('q-pct').textContent = pct+'%';
  var gb = document.getElementById('q-grade-badge');
  gb.textContent = grade;
  gb.className = 'q-grade '+grade;
  gb.style.background = gradeColor[grade];
}

// ── Audio upload ────────────────────────
function handleAudioFile(input) {
  var file = input.files[0];
  if(!file) return;
  var zone = document.getElementById('audio-drop-zone');
  var preview = document.getElementById('audio-preview');
  var txt = document.getElementById('audio-upload-text');
  // Local preview
  var url = URL.createObjectURL(file);
  preview.src = url;
  preview.style.display = 'block';
  txt.textContent = '🎵 '+file.name+' ('+Math.round(file.size/1024)+' KB)';
  zone.classList.add('has-file');
  qAudioURL = null; // will be set after upload
}

function uploadAudioToStorage(file, evalKey) {
  return new Promise(function(resolve, reject) {
    if(!fbStorage) { resolve(null); return; }
    var progress = document.getElementById('audio-upload-progress');
    var bar = document.getElementById('audio-progress-bar');
    var ptxt = document.getElementById('audio-progress-text');
    progress.style.display = 'block';
    var ref = fbStorage.ref('quality_recordings/'+evalKey+'_'+file.name);
    var task = ref.put(file);
    task.on('state_changed',
      function(snap){ var p=Math.round((snap.bytesTransferred/snap.totalBytes)*100); bar.style.width=p+'%'; ptxt.textContent='Uploading... '+p+'%'; },
      function(err){ reject(err); },
      function(){
        task.snapshot.ref.getDownloadURL().then(function(url){
          ptxt.textContent = 'Uploaded ✓'; resolve(url);
        });
      }
    );
  });
}

// ── Save evaluation ─────────────────────
function saveQuality() {
  var agent = document.getElementById('q-agent').value;
  var date  = document.getElementById('q-date').value;
  if(!agent) { alert('Please select an agent'); return; }
  if(!date)  { alert('Please select a date'); return; }

  var btn = document.getElementById('q-save-btn');
  var msg = document.getElementById('q-save-msg');
  btn.textContent = 'Saving...'; btn.style.background = '#555';

  var total = 0;
  Object.values(qScores).forEach(function(s){ total += s; });
  var pct = Math.round((total/70)*100);
  var grade = pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';

  var evalKey = Date.now().toString();
  var audioFile = document.getElementById('q-audio-file').files[0];

  function doSave(audioURL) {
    var eval_data = {
      agent: agent,
      date: date,
      notes: document.getElementById('q-notes').value.trim(),
      scores: Object.assign({}, qScores),
      metrics: Object.assign({}, qMetrics),
      totalScore: total,
      percentage: pct,
      grade: grade,
      audioURL: audioURL || null,
      createdAt: new Date().toISOString(),
      evalKey: evalKey,
    };
    if(!fbDb) { alert('Firebase not connected'); btn.textContent='Save Quality Evaluation'; btn.style.background='#C0392B'; return; }
    fbDb.ref('quality_evals/'+evalKey).set(eval_data)
      .then(function(){
        btn.textContent = '✓ Saved!'; btn.style.background = '#1E8449';
        msg.textContent = 'Evaluation saved successfully'; msg.style.display = 'block';
        setTimeout(function(){
          btn.textContent='Save Quality Evaluation'; btn.style.background='#C0392B';
          msg.style.display='none';
        }, 3000);
        resetQualityForm();
      })
      .catch(function(e){ alert('Error: '+e.message); btn.textContent='Save Quality Evaluation'; btn.style.background='#C0392B'; });
  }

  if(audioFile) {
    uploadAudioToStorage(audioFile, evalKey)
      .then(function(url){ doSave(url); })
      .catch(function(e){ console.warn('Audio upload failed:', e); doSave(null); });
  } else {
    doSave(null);
  }
}

function resetQualityForm() {
  qScores = {}; qMetrics = {}; qAudioURL = null;
  document.getElementById('q-agent').value = '';
  document.getElementById('q-notes').value = '';
  document.getElementById('q-audio-file').value = '';
  document.getElementById('audio-preview').style.display = 'none';
  document.getElementById('audio-upload-text').textContent = '📎 Click to upload MP3 / WAV file';
  document.getElementById('audio-drop-zone').classList.remove('has-file');
  document.getElementById('audio-upload-progress').style.display = 'none';
  document.getElementById('audio-progress-bar').style.width = '0%';
  buildQualityForm();
  updateScoreSummary();
}

    return '<div class="q-record">'
      +'<div class="q-record-hdr" onclick="toggleQRecord(this)">'

      +'<div style="font-size:11px;color:#555;margin-top:2px">'+dateStr+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<div style="text-align:right"><div style="font-size:18px;font-weight:700;color:'+gc+'">'+r.grade+'</div><div style="font-size:10px;color:#444">'+(r.percentage||0)+'%</div></div>'
      +'<div style="font-size:11px;color:#333">▾</div>'
      +'</div>'
      +'</div>'
      +'<div class="q-record-body">'
      +'<div class="q-mini-grid">'
      +'<div class="q-mini-item"><div class="q-mini-label">Total Score</div><div class="q-mini-val" style="color:'+gc+'">'+(r.totalScore||0)+' / 70</div></div>'
      +'<div class="q-mini-item"><div class="q-mini-label">Percentage</div><div class="q-mini-val" style="color:'+gc+'">'+(r.percentage||0)+'%</div></div>'
      +'</div>'
      +(r.notes?'<div style="background:#0F0F0F;border-radius:7px;padding:8px 10px;font-size:12px;color:#888;margin-bottom:8px">'+r.notes+'</div>':'')
      +(r.audioURL?'<div style="margin-bottom:8px"><div style="font-size:11px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.8px">🎙️ Call Recording</div><audio controls src="'+r.audioURL+'" style="width:100%;accent-color:#C0392B"></audio></div>':'')
      +'</div>'
      +'</div>';
  }).join('');
}

function toggleQRecord(hdr) {
  var body = hdr.nextElementSibling;
  body.classList.toggle('open');
}
